name: Pytest API Testing

on:
  push:
    branches: [ "main" ] # 当推送到 main 分支时触发
  pull_request:
    branches: [ "main" ]

jobs:
  Pytes-API-Testing:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
    - name: 1. 拉取最新代码
      uses: actions/checkout@v4 # 🔴 关键修复：已升级到最新版 v4

    - name: 2. 配置 Python 环境
      uses: actions/setup-python@v5 # 🔴 关键修复：已升级到最新版 v5
      with:
        python-version: "3.10" # 你可以改成你实际使用的 Python 版本，比如 3.9 或 3.11

    - name: 3. 安装测试依赖
      run: |
        python -m pip install --upgrade pip
        pip install pytest allure-pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. 运行 Pytest 自动化测试
      run: |
        pytest
